<!DOCTYPE html>
<html lang="">
<head>
    <title>Akutsu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-box-wrap">
        <div class="modal-box">
            <div class="box-title" id="authTitle">login</div>
            <div class="box-content">
                <div class="form-group">
                    <label>password</label>
                    <input type="password" id="authPassword" autocomplete="current-password">
                </div>
                <div id="authError" class="auth-error"></div>
                <div class="button-group">
                    <button class="btn" id="authSubmit" onclick="authSubmit()">login</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="app" style="display:none">
    <div class="container">
        <div class="header">
            <h1 class="accent">Akutsu</h1>
            <div style="display:flex;gap:12px;align-items:center;">
                <button class="btn" onclick="openCreateModal()">+ new script</button>
                <button class="btn btn-muted" onclick="logout()">logout</button>
            </div>
        </div>
        <div class="scripts-grid" id="scriptsGrid"></div>
    </div>
</div>

<!-- Create Modal -->
<div class="modal" id="createModal">
    <div class="modal-content">
        <div class="modal-box">
            <div class="box-title">create script</div>
            <div class="box-content">
                <div class="form-group">
                    <label>name</label>
                    <label for="createName"></label><input type="text" id="createName" required>
                </div>
                <div class="form-group">
                    <label>script path</label>
                    <label for="createScriptPath"></label><input type="text" id="createScriptPath" required placeholder="ChangeMe.sh!">
                </div>
                <div class="form-group">
                    <label>working directory</label>
                    <label for="createWorkingDir"></label><input type="text" id="createWorkingDir" required placeholder="~/ChangeMe">
                </div>
                <div class="form-group checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" id="createAutoStart">
                        <span class="checkbox-box"></span>
                        <span class="checkbox-label">start on boot</span>
                    </label>
                </div>
                <div class="button-group">
                    <button class="btn" onclick="submitCreate()">create</button>
                    <button class="btn btn-danger" onclick="closeModal('createModal')">cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-box">
            <div class="box-title">edit script</div>
            <div class="box-content">
                <div class="form-group">
                    <label>name</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>script path</label>
                    <input type="text" id="editScriptPath" required>
                </div>
                <div class="form-group">
                    <label>working directory</label>
                    <input type="text" id="editWorkingDirectory" required>
                </div>
                <div class="form-group checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" id="editAutoStart">
                        <span class="checkbox-box"></span>
                        <span class="checkbox-label">start on boot</span>
                    </label>
                </div>
                <div class="button-group">
                    <button class="btn" onclick="submitEdit()">save</button>
                    <button class="btn btn-danger" onclick="closeModal('editModal')">cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Info Modal -->
<div class="modal" id="infoModal">
    <div class="modal-content modal-wide">
        <div class="modal-box">
            <div class="box-title" id="infoTitle">info</div>
            <div class="box-content">
                <div class="info-top">
                    <div class="info-panel">
                        <div class="chart-container">
                            <canvas id="cpuChart"></canvas>
                        </div>
                    </div>
                    <div class="info-panel">
                        <div class="chart-container">
                            <canvas id="memChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="info-logs">
                    <div class="logs" id="logsContent"></div>
                </div>
                <div class="button-group">
                    <button class="btn" onclick="closeModal('infoModal')">close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Confirm Modal -->
<div class="confirm-modal" id="confirmModal">
    <div class="confirm-content">
        <div class="confirm-box">
            <div class="box-title">confirm</div>
            <div class="box-content">
                <div class="confirm-message" id="confirmMessage"></div>
                <div class="button-group">
                    <button class="btn btn-danger" id="confirmYes">yes</button>
                    <button class="btn" id="confirmNo">no</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
